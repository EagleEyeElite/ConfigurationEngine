apiVersion: apps/v1
kind: Deployment
metadata:
  name: configuration-engine
  labels:
    app: configuration-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configuration-engine
  template:
    metadata:
      labels:
        app: configuration-engine
    spec:
      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "untrusted"
          effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/hostname: k3s-apps-vm
      containers:
        - name: web
          image: registry.k8s.ts.conrad-klaus.de/configuration-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: configuration-engine
spec:
  type: ClusterIP
  selector:
    app: configuration-engine
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: configuration-engine
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - configurator.conrad-klaus.de
      secretName: configurator-tls
  rules:
    - host: configurator.conrad-klaus.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: configuration-engine
                port:
                  number: 80
